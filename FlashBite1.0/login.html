<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Flash Bite</title>

    <link rel="icon" href="logo.jpeg" type="image/jpeg">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .contenedor {
            width: 400px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .2);

            display: grid;
            grid-template-columns: 1fr;

            gap: 15px;

            position: relative;

            animation: aparecer .8s ease;
        }

        @keyframes aparecer {

            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }

        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
            color: orangered;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: bold;
            margin-top: 8px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            transition: .3s;
        }

        input:focus {
            outline: none;
            border-color: orangered;
            box-shadow: 0 0 8px rgba(255, 69, 0, .3);
        }

        .campo-password {
            position: relative;
        }

        .campo-password input {
            padding-right: 45px;
        }

        .ojo {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            user-select: none;
        }


        button {
            width: 100%;
            padding: 12px;
            background: orange;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: .3s;
        }

        button:hover {
            background: orangered;
            transform: scale(1.03);
        }

        .registro {
            text-align: center;
        }

        .registro a {
            text-decoration: none;
            color: orangered;
            font-weight: bold;
        }

        .cerrar {
            position: absolute;
            top: 12px;
            right: 18px;
            text-decoration: none;
            color: black;
            font-size: 24px;
            transition: .3s;
        }

        .cerrar:hover {
            color: orangered;
            transform: rotate(90deg);
        }

        .recuperar {
            text-align: center;
            margin-bottom: 15px;
        }

        .recuperar a {
            color: orangered;
            text-decoration: none;
            font-weight: bold;
        }

        .recuperar a:hover {
            text-decoration: underline;
        }

        /* ======================
            LAPTOP
        ====================== */

        @media screen and (max-width:1200px) {

            .contenedor {
                width: 420px;
            }

        }

        /* ======================
            TABLET
        ====================== */

        @media screen and (max-width:768px) {

            body {
                padding: 25px;
            }

            .contenedor {
                width: 100%;
                max-width: 420px;
            }

        }

        /* ======================
            CELULAR
        ====================== */

        @media screen and (max-width:480px) {

            body {
                padding: 15px;
            }

            .contenedor {
                width: 100%;
                padding: 20px;
            }

            h2 {
                font-size: 26px;
            }

            button {
                font-size: 15px;
            }

        }
    </style>

</head>

<body>

    <div class="contenedor">

        <a href="bienvenida.html" class="cerrar"> X </a>

        <h2> Iniciar Sesión </h2>

        <form action="php/login_usuario.php" method="POST" id="formLogin">

            <label> Correo</label>
            <input type="email" id="correo" name="correo" placeholder="Ingrese su correo">


            <label>Contraseña</label>

            <div class="campo-password">

                <input type="password" id="password" name="password" placeholder="Ingrese su contraseña">

                <span class="ojo" id="verPassword">

                    <svg id="iconoPassword" xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none"
                        stroke="gray" stroke-width="2" viewBox="0 0 24 24">

                        <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z" />
                        <circle cx="12" cy="12" r="3" />

                    </svg>

                </span>

            </div>


            <button type="submit" id="btnLogin">Iniciar Sesión</button>
            <br>
            <p id="mensajeError" style="text-align:center; font-weight:bold; margin-top:12px;"></p>

            <p style="text-align:center;margin-top:15px;">
                <a href="recuperar.html" style="color:orangered;font-weight:bold;text-decoration:none;">
                    ¿Olvidaste tu contraseña?
                </a>
            </p>

        </form>


        <div class="registro">

            <p> ¿Aún no estás en Flash Bite? </p> <br>

            <a href="registro.html">
                <button type="submit"> Regístrate aquí</button>
            </a>

        </div>

    </div>

    <script src="js/login.js"></script>

</body>

</html>
