<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

    <title>Flash Bite</title>

    <link rel="icon" href="logo.jpeg" type="image/jpeg">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .contenedor {
            width: 400px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .2);

            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;

            animation: aparecer .8s ease;
        }

        @keyframes aparecer {

            from {
                opacity: 0;
                transform: translateY(35px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }

        }

        h2 {
            text-align: center;
            color: orangered;
            margin-bottom: 10px;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            transition: .3s;
            font-size: 15px;
        }

        .campo-password {
            position: relative;
        }

        .campo-password input {
            padding-right: 45px;
            margin-bottom: 5px;
        }

        .ojo {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            user-select: none;
        }

        input:focus {
            outline: none;
            border-color: orangered;
            box-shadow: 0 0 8px rgba(255, 69, 0, .3);
        }

        button {
            width: 100%;
            padding: 12px;
            background: orange;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: .3s;
        }

        button:hover {
            background: orangered;
            transform: scale(1.03);
        }

        /*====================
            Laptop
        ====================*/

        @media screen and (max-width:1200px) {

            .contenedor {
                width: 420px;
            }

        }

        /*====================
            Tablet
        ====================*/

        @media screen and (max-width:768px) {

            body {
                padding: 25px;
            }

            .contenedor {
                width: 100%;
                max-width: 420px;
            }

        }

        /*====================
            Celular
        ====================*/

        @media screen and (max-width:480px) {

            body {
                padding: 15px;
            }

            .contenedor {
                width: 100%;
                padding: 20px;
            }

            h2 {
                font-size: 24px;
            }

            button,
            input {
                font-size: 15px;
            }

        }
    </style>
</head>

<body>

    <div class="contenedor">
        <h2>Recuperar contraseña</h2>

        <form action="php/recuperar_password.php" method="POST" id="formRecuperar">

            <label for="correo">Correo electrónico</label>

            <input type="email" id="correo" name="correo" placeholder="Ingrese su correo registrado"
                autocomplete="email" required>

            <small id="ayudaCorreo"></small>



            <label for="password">Nueva contraseña</label>

            <div class="campo-password">

                <input
                type="password"
                id="password"
                name="password"
                placeholder="Ingrese una nueva contraseña"
                autocomplete="new-password"
                required>

                <span class="ojo" id="verPassword">

                    <svg
                    id="iconoPassword"
                    xmlns="http://www.w3.org/2000/svg"
                    width="22"
                    height="22"
                    fill="none"
                    stroke="gray"
                    stroke-width="2"
                    viewBox="0 0 24 24">

                        <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
                        <circle cx="12" cy="12" r="3"/>

                    </svg>

                </span>

            </div>

            <small id="seguridadPassword"></small>



            <label for="password2">Confirmar contraseña</label>

            <div class="campo-password">

                <input
                type="password"
                id="password2"
                name="password2"
                placeholder="Repita la contraseña"
                autocomplete="new-password"
                required>

                <span class="ojo" id="verConfirmar">

                    <svg
                    id="iconoConfirmar"
                    xmlns="http://www.w3.org/2000/svg"
                    width="22"
                    height="22"
                    fill="none"
                    stroke="gray"
                    stroke-width="2"
                    viewBox="0 0 24 24">

                        <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
                        <circle cx="12" cy="12" r="3"/>

                    </svg>

                </span>

            </div>

            <small id="mensajeConfirmar"></small>



            <button type="submit">
                Cambiar contraseña
            </button>

            <p id="mensajeRecuperar"
            style="text-align:center;font-weight:bold;margin-top:15px;"></p>

            <br>
            <a href="login.html">
                <button type="button">
                    Volver al inicio de sesión
                </button>
            </a>

        </form>
    </div>

    <script src="js/recuperar.js"></script>

</body>

</html>
