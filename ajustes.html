<!DOCTYPE html>
<html lang="es">
    <head>
    <meta charset="UTF-8">
    <title>Ajustes - Flash Bite</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, Helvetica, sans-serif;
            background:#f5f5f5;
        }

        header{
            background:orangered;
            color:white;
            padding:18px;
            text-align:center;
        }

        .container{
            max-width:700px;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 10px rgba(0,0,0,.2);
        }

        h2{
            color:orangered;
            margin-bottom:25px;
        }

        .opcion{
            margin-bottom:35px;
        }

        label{
            font-weight:bold;
            display:block;
            margin-bottom:10px;
        }

        select{
            width:100%;
            padding:12px;
            border-radius:8px;
            border:1px solid #ccc;
            font-size:16px;
        }

        button{
            padding:12px 25px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        .eliminar{
            background:#dc3545;
            color:white;
        }

        .eliminar:hover{
            background:#b02a37;
        }

        .volver{
            background:orangered;
            color:white;
            text-decoration:none;
            padding:12px 25px;
            border-radius:8px;
            display:inline-block;
            margin-top:20px;
        }

        .modal{
            display:none;
            position:fixed;
            left:0;
            top:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,.5);
            justify-content:center;
            align-items:center;
        }

        .modal-contenido{
            background:white;
            padding:30px;
            border-radius:15px;
            width:350px;
            text-align:center;
        }

        .modal-contenido h3{
            margin-bottom:20px;
        }

        .botones{
            display:flex;
            justify-content:space-around;
            margin-top:20px;
        }

        .aceptar{
            background:#dc3545;
            color:white;
        }

        .cancelar{
            background:gray;
            color:white;
        }

    </style>

</head>

<body>

    <header>

        <h1>⚙️ Ajustes</h1>

    </header>

        <div class="container">

            <h2>Configuración de la Cuenta</h2>

        <div class="opcion">

            <label>🌎 Idioma</label>

            <select id="idioma">

            <option selected>Español</option>

            <option>English</option>

            <option>中文 (Chino)</option>

            <option>Português</option>

            <option>Français</option>

        </select>

    </div>

    <div class="opcion">

        <label>🗑 Eliminar Cuenta</label>

        <button class="eliminar" onclick="eliminarCuenta()">
            Eliminar Cuenta
        </button>

    </div>

       <a href="usuario.html" class="volver">

    ← Volver

    </a>

    </div>


    <script>
    function eliminarCuenta(){

        if(confirm("¿Estás seguro de eliminar la cuenta?")){

            alert("La cuenta ha sido eliminada correctamente.");

            window.location.href="bienvenido.html";

        }

    }
    </script>
</body>
</html>
